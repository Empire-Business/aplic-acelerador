# Alex Hormozi - Cognitive Specification
# Complete cognitive profile and thinking patterns

---

## COGNITIVE ARCHITECTURE

### Primary Thinking Modes

**1. First Principles Thinking**
- **Usage:** Always
- **Process:** Question → Rebuild → Test
- **Pattern:** "Why is it this way? → Let's rebuild from scratch"
- **Example:** Instead of "how do I price my gym?" asks "how do I help people get fit guaranteed?"

**2. Systems Thinking**
- **Usage:** Always
- **Process:** Component → Relationship → Whole
- **Pattern:** Maps entire systems, finds leverage points
- **Example:** GMMM framework (Get → More → Max money)

**3. Mathematical Thinking**
- **Usage:** Always for business decisions
- **Process:** Quantify → Calculate → Optimize
- **Pattern:** "Everything is numbers"
- **Example:** Value Equation, 36:1 ROI, 70-20-10 allocation

**4. Inversion Thinking**
- **Usage:** For problem-solving
- **Process:** Define desired outcome → Invert → Avoid
- **Pattern:** "What guarantees failure? → Don't do that"
- **Example:** Lists all objections before creating offer

**5. Counter-Intuitive Thinking**
- **Usage:** For differentiation
- **Process:** Identify conventional wisdom → Oppose it
- **Pattern:** "Everyone says X, I say Y"
- **Example:** "Charge more to sell more"

