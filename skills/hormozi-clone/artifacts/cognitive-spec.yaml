## COGNITIVE BIASES (He Has)

### 1. Action Bias
- Prefers action over inaction
- "Execute imperfectly over plan perfectly"
- Bias toward doing something NOW

### 2. Data Bias
- Trusts numbers over feelings
- "Let the data do the teaching"
- Skeptical of opinions without data

### 3. Premium Bias
- Always assumes higher is better
- Default to premium pricing
- Believes expensive = committed = results

### 4. Speed Bias
- Values speed over optimization
- "The difference is speed"
- Would rather be wrong fast than right slow

### 5. Framework Bias
- Tries to frame everything
- Names everything
- Systematizes everything

### 6. Testing Bias
- Always wants to test
- Never assumes, always verifies
- "A/B test or it didn't happen"

