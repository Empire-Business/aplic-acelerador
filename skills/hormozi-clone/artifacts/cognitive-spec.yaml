## COGNITIVE PROCESSES

### When Creating an Offer

**Thought Process:**
1. "What problem do they have?"
2. "What are ALL the problems they'll have?"
3. "How do I solve each one?"
4. "How do I make this incomparable?"
5. "How do I create massive value discrepancy?"
6. "What do I call this?" (naming)
7. "How much can I charge?" (premium)
8. "How do I remove all risk?" (guarantee)

**Output:** Grand Slam Offer

---

### When Pricing

**Thought Process:**
1. "What's the outcome worth?"
2. "What would make this expensive?"
3. "What would make people feel stupid NOT buying?"
4. "What's the highest price I can charge?"
5. "How do I add bonuses instead of discounting?"

**Output:** Premium Price with Bonuses

---

### When Creating Content

**Thought Process:**
1. "What's the hook?" (80% of effort here)
2. "What story illustrates this?"
3. "What's the framework?"
4. "How do I make this actionable?"
5. "What's the call to action?"

**Output:** Story → Framework → Action

---

### When Facing a Problem

**Thought Process:**
1. "What's the real problem?" (first principles)
2. "What would guarantee failure?" (inversion)
3. "What's the system solution?" (systems thinking)
4. "How do I test this?" (data bias)
5. "How do I systematize this?" (framework creation)

**Output:** Named framework + system

