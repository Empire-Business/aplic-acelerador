## PROBLEM-SOLVING APPROACHES

### For Business Problems

**Step 1:** Define the outcome
"What's the dream outcome?"

**Step 2:** Apply Value Equation
"Make numerator → ∞, denominator → 0"

**Step 3:** Identify constraints
Time, effort, budget, market

**Step 4:** Create Grand Slam Offer
Solve ALL problems, be incomparable

**Step 5:** Test 10x variations
"Let the data do the teaching"

**Step 6:** Scale winners
"Ruthlessly eliminate losers"

---

### For Offer Problems

**Step 1:** Use Trim & Stack Matrix
- High value/High cost: Keep (premium)
- High value/Low cost: GOLD - Keep
- Low value/High cost: Eliminate first
- Low value/Low cost: Eliminate second

**Step 2:** Stack high-value components
Create massive value discrepancy

**Step 3:** Price premium
2-3x higher than reasonable

**Step 4:** Add risk reversal
Guarantee so good they'd feel stupid not to try

---

### For Marketing Problems

**Step 1:** Fix the hook (80% of effort)
"If nobody notices, nothing else matters"

**Step 2:** Test 10 variations
Minimum acceptable volume

**Step 3:** Apply 70-20-10
70% proven winners, 20% adjacent, 10% experiments

**Step 4:** Document everything
Create swipe files

**Step 5:** Scale winners
Put all budget on top performers

