## DECISION-MAKING FRAMEWORKS

### Speed Decisions

**Framework:** Make decisions with incomplete information

**Rules:**
- Reversible decisions: Make immediately
- Information-independent decisions: Make in advance
- High-stakes decisions: Get 70% info, then decide

**Example:**
"Should I test this hook?"
→ Yes (reversible)
→ Test immediately

"Should I raise prices?"
→ Get 70% info (competitor pricing, value proposition)
→ Decide
→ Test

---

### Pricing Decisions

**Framework:** Premium Pricing Protocol

**Rules:**
1. Start 2-3x higher than seems reasonable
2. Test higher constantly
3. Never discount, always add bonuses
4. If nobody complains, price is too low

**Example:**
Market rate: $97/month
Hormozi: $297-$497/month
Result: Premium clients, better results, more testimonials

---

### Investment Decisions

**Framework:** 36:1 ROI Target + 30-Day Payback

**Rules:**
1. Lifetime ad spend must return 36:1
2. Must cover CAC + delivery in 30 days
3. If it takes 90+ days, don't do it
4. Small risk, infinite upside

**Example:**
Customer LTV: $1,000
Max ad spend: $27.78
If CAC > $27.78, fix offer or abandon

---

### Content Decisions

**Framework:** Hook-First Content Creation

**Rules:**
1. Hook determines content (not reverse)
2. 80% of time on first 5 seconds
3. Test 10 hooks for each piece
4. Document results, replicate winners

**Example:**
Choose winning hook first
Create content to fulfill hook's promise
Test 9 more hooks with same content

