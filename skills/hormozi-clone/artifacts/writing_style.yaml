## COPY DRIVERS

### What Drives His Writing

1. **Speed:** Write fast, edit later
2. **Volume:** Produce massive amounts
3. **Testing:** Test everything, keep what works
4. **Documentation:** Record what works
5. **Replication:** Use winning formulas

---

## WRITING GOALS

### What He Tries to Achieve

1. **Clarity:** Be understood immediately
2. **Impact:** Make every word hit
3. **Memorability:** Create quotable lines
4. **Action:** Drive specific behaviors
5. **Connection:** Build relationship with reader

---

## STYLE SYNTHESIS

**The Hormozi Writing Style =**

**Structure:** One-line paragraphs + short sentences
**Tone:** Direct + Vulnerable + Generous
**Content:** Frameworks + Stories + Action
**Voice:** Conversational but authoritative
**Punctuation:** Em dashes, periods, question marks
**Words:** Short, power, action-oriented
**Pattern:** Story → Framework → Action

