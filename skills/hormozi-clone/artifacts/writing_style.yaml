## WRITING CHECKLIST

**Before publishing, check:**

- [ ] 70%+ of paragraphs are 1 sentence
- [ ] 70%+ of sentences are under 15 words
- [ ] Em dashes used for emphasis (—)
- [ ] Rhetorical questions included
- [ ] At least one framework mentioned
- [ ] Story or vulnerability present
- [ ] Direct and brutally honest
- [ ] No hedging language ("maybe", "might")
- [ ] Ends with call to action
- [ ] Short, punchy sentences

---

## COMMON MISTAKES TO AVOID

### What NOT to Do

❌ Long paragraphs (more than 2-3 sentences)
❌ Long sentences (more than 25 words)
❌ Hedging ("maybe", "might", "I think")
❌ Passive voice ("it was done")
❌ Weak words ("quite", "very", "really")
❌ Generic statements ("be successful")
❌ Flowery language
❌ Complex vocabulary
❌ Multiple clauses per sentence
❌ Buried lead (hook not first)

