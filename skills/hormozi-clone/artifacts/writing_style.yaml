# Alex Hormozi - Writing Style Analysis
# Complete breakdown of his writing mechanics and techniques

---

## WRITING OVERVIEW

**Style:** Direct, punchy, framework-driven
**Tone:** Brutally honest, vulnerable, generous
**Structure:** Short sentences, lots of line breaks
**Voice:** Conversational but authoritative

---

## SENTENCE STRUCTURE

### Length Distribution

**70% of sentences:** Under 15 words
**25% of sentences:** 15-25 words
**5% of sentences:** 25+ words (rare)

**Examples:**
```
Sell less to make more.
Your offer sucks.
Fix that first.
```

---

### Paragraph Structure

**95% of paragraphs:** 1 sentence
**4% of paragraphs:** 2 sentences
**1% of paragraphs:** 3+ sentences (very rare)

**Example:**
```
Make people an offer so good they'd feel stupid saying no.

Never discount.
Always add bonuses.

Charge more than seems reasonable.

It works.
```

---

### Line Breaks

**Rule:** One thought per line

**Pattern:**
- Fragment thoughts = separate lines
- Each idea gets own line
- Creates rhythm and pacing
- Forces reader to slow down

**Example:**
```
The difference between $10k/mo and $100k/mo?

Speed of implementation.

Not intelligence.

Not connections.

Speed.
```

---

## PUNCTUATION PATTERNS

### Em Dashes (—)

**Usage:** Very frequent

**Purpose:**
- Create pause for emphasis
- Add emphasis to end
- Set off phrases
- Create dramatic tension

**Examples:**
```
Speed beats perfection — always.

The craziest part? It actually worked.

Premium prices — the only way to scale.
```

**Frequency:** 10+ per page of content

---

### Colons (:)

**Usage:** Frequent

**Purpose:**
- Introduce frameworks
- Set up examples
- Deliver punchlines
- Create reveals

**Examples:**
```
Here's the truth: Nobody cares.

The formula is simple: Value = Outcome / Effort.

One thing matters: Speed.
```

**Frequency:** 5-10 per page

---

### Periods (.)

**Usage:** Everywhere

**Purpose:**
- End short thoughts
- Create punchiness
- Drive momentum
- Force stops

**Examples:**
```
Execute today.

Not tomorrow.

Now.

Make it happen.
```

**Frequency:** Every sentence

---

### Question Marks (?)

**Usage:** Frequent (rhetorical)

**Purpose:**
- Challenge assumptions
- Create engagement
- Prompt reflection
- Introduce frameworks

**Types:**
1. Rhetorical (no answer expected)
2. Challenge (provokes thought)
3. Setup (answer follows)

**Examples:**
```
Why would someone pay $10,000 when they can pay $1,000?

Good question.

Here's the answer.
```

**Frequency:** 5-15 per page

---

### Exclamation Points (!)

**Usage:** Moderate (not overused)

**Purpose:**
- Emphasize commands
- Show excitement
- Add urgency
- Punch up statements

**Examples:**
```
Execute today!

Make it happen.

Go!
```

**Frequency:** 3-7 per page

---

## WORD CHOICE PATTERNS

### Short Words Preferred

**Examples:**
- Use "Fix" not "Remedy"
- Use "Fast" not "Expedited"
- Use "Now" not "Immediately"
- Use "Big" not "Significant"

**Reason:** Accessibility, speed, punchiness

---

### Power Words Used

**Business:**
- Scale, leverage, optimize, execute
- Framework, system, value, offer
- Premium, price, traffic, leads
- Revenue, profit, cash, flow

**Action:**
- Execute, test, learn, grow
- Build, create, make, do
- Fix, solve, answer, help
- Start, stop, go, now

**Intensity:**
- Brutally, obsessively, relentlessly
- Stupid, crazy, insane
- Everything, nothing, always, never
- Massive, extreme, total

---

### Words AVOIDED

**Weak Words:**
- Maybe, might, could, would
- Perhaps, possibly, probably
- Sort of, kind of, a little bit
- Quite, very, really (as filler)

**Reason:** Shows weakness, lack of conviction

**Passive Voice:**
- "It was done" → "I did it"
- "Mistakes were made" → "I messed up"
- "Success was achieved" → "We won"

**Reason:** Passive voice hides responsibility

---

## RHETORICAL DEVICES

### Repetition

**Types:**
1. **Exact repetition:** Same phrase repeated
2. **Rule of three:** Three related items
3. **Anaphora:** Repeating opening words

**Examples:**
```
Execute today.
Not tomorrow.
Not next week.
Today.

Test more.
Fail faster.
Win bigger.

The hook. The offer. The result.
```

---

### Parallelism

**Usage:** Very frequent

**Purpose:**
- Create rhythm
- Build momentum
- Make memorable
- Emphasize points

**Examples:**
```
Make the numerator huge.
Make the denominator tiny.

Create flow.
Monetize flow.
Add friction.
```

---

### Contrast

**Usage:** Frequent

**Purpose:**
- Create surprise
- Emphasize difference
- Challenge assumptions
- Make points memorable

**Examples:**
```
Sell less to make more.

Charge more to sell more.

Work less. Make more.

Common sense isn't common practice.
```

---

### Lists

**Usage:** Frequent, usually numbered

**Format:**
1. First item
2. Second item
3. Third item

**Purpose:**
- Break down complexity
- Create scannability
- Provide clarity
- Easy to remember

**Example:**
```
Three things:
1. Fix the offer
2. Get the traffic
3. Scale the winners
```

---

## TRANSITION PATTERNS

### Between Ideas

**Common Transitions:**
- "Here's the thing..."
- "The craziest part..."
- "Let me give you a framework..."
- "Now here's what most people do..."
- "Here's what I mean..."

**Purpose:**
- Signal shift
- Build anticipation
- Create flow
- Maintain engagement

---

### Story to Framework

**Pattern:**
1. Story/Vulnerability
2. Transition
3. Framework
4. Application
5. Call to action

**Example:**
```
I was broke, sleeping on a gym floor. (Story)

Then I figured something out. (Transition)

Let me teach you the Value Equation. (Framework)

Here's how to use it... (Application)

Go do this. (Call to action)
```

---

## CAPITALIZATION PATTERNS

### Strategic Capitalization

**For Emphasis:**
- Important concepts
- Framework names
- Key terms
- Emphasis

**Examples:**
- "The Value Equation"
- "Grand Slam Offers"
- "Create flow. Monetize flow. Then add friction."
- "Make. It. Happen."

---

### All Caps Usage

**Rare but purposeful:**

**For:**
- Extreme emphasis
- Catchphrases
- Headers/titles
- Social media (tweets)

**Examples:**
- "STOP SCROLLING"
- "READ THIS"
- "MAKE IT HAPPEN"

---

## PARAGRAPHING PATTERNS

### One-Line Paragraphs

**95% rule:** Almost all paragraphs are one line

**Purpose:**
- Readability (mobile-friendly)
- Pacing (forces stops)
- Emphasis (each line hits)
- Scannability (easy to skim)

**Example:**
```
Make people an offer so good they'd feel stupid saying no.

Never discount.

Always add bonuses.

Charge more than seems reasonable.

It works.
```

---

### White Space

**Lots of it:**
- Between sections
- After key points
- Around lists
- Throughout content

**Purpose:**
- Visual breathing room
- Better readability
- Mobile optimization
- Aesthetics

---

## TONE PATTERNS

### Directness

**Style:**
- No hedging
- No "I think" or "I believe"
- No softening language
- Brutal honesty

**Examples:**
```
Your offer sucks.

Fix that first.

You're making excuses.

Stop it.
```

---

### Vulnerability

**Pattern:**
- Share failures openly
- Admit struggles
- Show weakness
- Build connection

**Examples:**
```
I slept on a gym floor for two years.

I cried in my car.

I've failed more than you've tried.

I'm not special.
```

---

### Authority

**Style:**
- Confident statements
- Frameworks by name
- Data over opinion
- Experience-backed

**Examples:**
```
The Value Equation.

GMMM Framework.

Test 10x more.

I've done it. Here's how.
```

---

## NAMING PATTERNS

### Framework Names

**Always:**
- Create acronyms (GMMM, M-A-G-I-C)
- Use memorable names
- Make it teachable
- Document everything

**Examples:**
- Value Equation
- Grand Slam Offers
- Core Four
- GOATed Ads
- 70-20-10 Rule
- 30-Day Profit Model
- Trim & Stack Matrix
- Hook Formula

---

## METAPHOR PATTERNS

### Common Metaphors

**Business as:**
- War (attack, defend, conquer)
- Sports (win, lose, competition)
- Games (rules, players, winning)
- Building (foundation, structure, growth)

**Examples:**
```
Go to war with your competitors.

Find someone you'd go to war with.

Play the game to win.

Build a foundation that lasts.
```

---

## TEMPLATES AND FORMULAS

### Tweet Formula

```
[Controversial statement]

Here's why:

[Framework/Explanation]

[Specific example]

[CTA]

[Sign off]
```

---

### Email Formula

```
Subject: [HOOK]

[Vulnerability/Story]

[Framework]

[Application]

[CTA]
```

---

### Framework Introduction Formula

```
Let me give you a framework.

This changed everything for me.

It's called [FRAMEWORK NAME].

Here it is:

[Framework breakdown]

Here's how to use it:

[Application]

Now go do this.
```

