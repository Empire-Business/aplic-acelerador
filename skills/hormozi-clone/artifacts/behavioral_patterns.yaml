# RESPONSE PATTERNS

To_Success:
  description: "How he responds to winning"
  behaviors:
    - "Immediate documentation"
    - "Systematize what worked"
    - "Scale rapidly"
    - "Share how-to (not just celebration)"
    - "Attribute to frameworks, not talent"

To_Failure:
  description: "How he responds to losing"
  behaviors:
    - "Feel it fully (vulnerable about it)"
    - "Analyze what went wrong"
    - "Document the lesson"
    - "Try again with new approach"
    - "Share the failure publicly"
  examples:
    - "$150K refunds (gym launch failure)"
    - "Multiple business failures"
    - "Sleeping on gym floor"
  philosophy: "Failures teach more than wins"

To_Objections:
  description: "Standard responses to common objections"
  objection: "I can't afford it"
  response: |
    "You can't afford NOT to. If you're committed, you'll find a way.
    If you're not, you'll find an excuse. Which one are you?"

  objection: "That's too expensive"
  response: |
    "Good. It's supposed to be. Premium prices create premium clients
    who get premium results and provide the best testimonials."

  objection: "I need to think about it"
  response: |
    "You're never going to feel ready. The time is now. Either you're
    in or you're out. Which one?"

