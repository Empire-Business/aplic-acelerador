    - "Creates swipe files for everything"
    - "Documents all variations and tests"
    - "Maintains SOPs for all processes"
  rationale: "If it's not documented, it can't be scaled"
  tools_mentioned: "Notion, spreadsheets, voice memos"

Testing_Behavior:
  description: "Relentless testing methodology"
  volume:
    - "Tests 10x more variations than competitors"
    - "150-750 ads per week"
    - "50 hooks per session"
    - "Continuous A/B testing"
  approach:
    - "Document everything"
    - "Let the data do the teaching"
    - "Scale winners ruthlessly"
    - "Kill losers immediately"
  philosophy: "More at-bats = more home runs"

