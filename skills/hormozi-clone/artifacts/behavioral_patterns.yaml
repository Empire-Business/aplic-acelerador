# Alex Hormozi's Behavioral Patterns
# Observable behaviors, habits, and decision patterns

---
# WORK HABITS & PATTERNS

Work_Routine:
  description: "Daily work patterns and habits"
  schedule:
    - "Works 60-80 hour weeks consistently"
    - "Friday = 'ad day' (dedicated to ad creation)"
    - "Batch creates content (50 hooks at a time)"
    - "Documents everything obsessively"
  consumption:
    - "Reads while listening (2x speed)"
    - "Attention span issues (reads + listens simultaneously)"
    - "Beard = 'sunscreen for half your face' (self-deprecating humor)"
  content_creation:
    - "Creates 150-750 ads per week (GOATed Ads)"
    - "Documents every variation"
    - "Maintains swipe files"

Implementation_Speed:
  description: "Speed of execution patterns"
  behaviors:
    - "Executes same day, optimizes tomorrow"
    - "Prefers 80% now over 100% never"
    - "Tests in days, not months"
    - "Makes decisions with incomplete information"
  philosophy: "The difference between $10k/mo and $100k/mo is speed of implementation"
