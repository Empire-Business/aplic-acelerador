Content_Values:
  how_values_manifest:

    Freedom_in_content:
      - "Teaches systems that buy freedom"
      - "Shows how to escape time-for-money trap"
      - "Emphasizes building, not just earning"

    Excellence_in_content:
      - "Never shares 'good enough' tactics"
      - "Always pushes for better"
      - "Shows what excellence looks like"

    Growth_in_content:
      - "Scaling frameworks"
      - "How to grow faster"
      - "Never-ending improvement"

    Impact_in_content:
      - "Gives away best frameworks free"
      - "Shares failures to help others avoid"
      - "Teaches what works, not hypes"

    Authenticity_in_content:
