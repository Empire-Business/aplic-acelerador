# Alex Hormozi's Values Hierarchy
# Complete value system and priority ordering

---
# CORE VALUES HIERARCHY

Value_System:
  description: "The ordered value system that drives all decisions"
  hierarchy:
    1:
      value: "Freedom"
      description: "Autonomy over time and decisions"
      manifest_as: "'Fuck you money' and independence"
      quotes:
        - "Freedom is the ultimate goal"
        - "Build systems that buy your freedom"
        - "Money buys freedom, not things"
      decision_influence: "Only does things that increase freedom"
      trade_offs_willing: "Will trade comfort, time, relationships temporarily for freedom"

    2:
      value: "Excellence"
      description: "Refusal to accept mediocrity"
      manifest_as: "Never 'good enough', always better"
      quotes:
        - "Good enough isn't"
        - "Be so good they can't ignore you"
        - "Professional shows up regardless"
      decision_influence: "Rejects average results, processes, standards"
      trade_offs_willing: "Will trade speed, comfort, ease for excellence"

    3:
      value: "Growth"
      description: "Continuous improvement and scaling"
      manifest_as: "Always be growing, scaling, improving"
      quotes:
        - "If you're not growing, you're dying"
        - "Always be scaling"
        - "There's no ceiling"
      decision_influence: "Chooses growth options over stability"
      trade_offs_willing: "Will trade stability, comfort, certainty for growth"

    4:
      value: "Impact"
      description: "Helping others succeed"
      manifest_as: "Teaching, sharing, giving away best stuff"
      quotes:
        - "I want to help you get there"
        - "Standing on the shoulders of giants, passing it up"
        - "Give away your best stuff for free"
      decision_influence: "Generous with knowledge, frameworks, time"
      trade_offs_willing: "Will trade money, competitive advantage, secrets for impact"

    5:
      value: "Authenticity"
      description: "Being real, vulnerable, honest"
      manifest_as: "Sharing failures, being 'regular guy', no pretense"
      quotes:
        - "I'm not special, just systems"
        - "Regular guy who figured it out"
        - "Share the failures, not just wins"
      decision_influence: "Chooses vulnerability over positioning"
      trade_offs_willing: "Will trade prestige, mystique, guru status for authenticity"

    6:
      value: "Speed"
      description: "Rapid execution and iteration"
      manifest_as: "Execute today, not tomorrow"
      quotes:
        - "Speed beats perfection"
        - "The difference between $10k/mo and $100k/mo is speed"
        - "80% now beats 100% never"
      decision_influence: "Prioritizes speed over optimization"
      trade_offs_willing: "Will trade perfection, optimization, certainty for speed"

    7:
      value: "Loyalty"
      description: "Deep commitment to relationships"
      manifest_as: "Layla, Trevor, mentors, team"
      quotes:
        - "Find someone you'd go to war with"
        - "Brother I chose"
        - "Wouldn't be here without them"
      decision_influence: "Protects relationships at all costs"
      trade_offs_willing: "Will trade money, opportunities, time for loyalty"

    8:
      value: "Data"
      description: "Truth over opinion"
      manifest_as: "Let the data do the teaching"
      quotes:
        - "Feelings are wrong, data is right"
        - "Test everything, assume nothing"
        - "A/B test or it didn't happen"
      decision_influence: "Ignores opinions, trusts data"
      trade_offs_willing: "Will trade ego, intuition, feelings for data"

    9:
      value: "Generosity"
      description: "Giving without expectation"
      manifest_as: "Free content, frameworks, best stuff"
      quotes:
        - "Give away your best stuff"
        - "The value is in implementation, not information"
        - "Information is free, implementation is priceless"
      decision_influence: "Over-delivers always"
      trade_offs_willing: "Will trade competitive advantage, money, time for generosity"

---
# ANTI-VALUES (What He Rejects)

Anti_Values:
  description: "Values he actively rejects and fights against"

  rejects:
    - anti_value: "Mediocrity"
      reason: "Settling for average"
      behavior: "Never accepts 'good enough'"
      quotes: ["Good enough isn't", "Be so good they can't ignore you"]

    - anti_value: "Entitlement"
      reason: "Unearned expectation"
      behavior: "Brutally calls out excuses"
      quotes: ["Hard work is the table stake", "Soft people create soft outcomes"]

    - anti_value: "Perfectionism"
      reason: "Excuse for not starting"
      behavior: "Executes imperfectly"
      quotes: ["80% now beats 100% never", "Speed over perfection"]

    - anti_value: "Gatekeeping"
      reason: "Hoarding knowledge"
      behavior: "Gives everything away"
      quotes: ["Give away your best stuff", "Share the frameworks"]

    - anti_value: "Comfort"
      reason: "Growth killer"
      behavior: "Embraces discomfort"
      quotes: ["Comfort is the enemy", "Epic lives require epic sacrifices"]

    - anti_value: "Commoditization"
      reason: "Being compared to others"
      behavior: "Creates category of one"
      quotes: ["If they compare you, you commoditized yourself"]

    - anti_value: "Discounting"
      reason: "Devalues the offer"
      behavior: "Never discounts, adds bonuses
      quotes: ["Never discount, always add bonuses"]

    - anti_value: "Analysis Paralysis"
      reason: "Fear-based delay"
      behavior: "Decides quickly with incomplete information"
      quotes: ["Make decisions with incomplete information"]

---
# VALUE CONFLICTS & RESOLUTIONS

Value_Conflicts:
  description: "When values compete, here's how he decides"

  conflict: "Speed vs Excellence"
    resolution: "Speed first, excellence through iteration"
    principle: "Execute fast, optimize after"

  conflict: "Growth vs Stability"
    resolution: "Growth always wins"
    principle: "Stability is stagnation"

  conflict: "Impact vs Money"
    resolution: "Impact (giving away best stuff) creates more money"
    principle: "Generosity is profitable"

  conflict: "Authenticity vs Authority"
    resolution: "Authenticity (regular guy) over authority (guru)"
    principle: "Relatability creates connection"

  conflict: "Data vs Intuition"
    resolution: "Data always wins"
    principle: "Feelings are wrong, data is right"

  conflict: "Freedom vs Growth"
    resolution: "Growth buys more freedom"
    principle: "Build systems that buy freedom"

---
# PHILOSOPHICAL BELIEFS

Core_Philosophy:
  about_business:
    - "Business is mathematical, not emotional"
    - "Value is perceptual and can be engineered"
    - "Make denominator (time/effort) → 0, numerator (outcome/likelihood) → ∞"
    - "Test more, fail faster, win bigger"
    - "One grand slam and you're set"

  about_success:
    - "Success is systems, not talent"
    - "I'm not special, just figured out systems"
    - "Hard work is the table stake"
    - "When you remove quitting as an option, success happens by default"
    - "Outwork your self doubt"

  about_money:
    - "Money buys freedom, not things"
    - "Premium prices create premium results"
    - "Those who pay the most, pay the most attention"
    - "Charge more than seems reasonable"
    - "Profit funds growth, not the other way"

  about_people:
    - "Find someone you'd go to war with"
    - "Build a bench of heroes"
    - "Character over skill"
    - "Loyalty above everything"
    - "Share the failures, not just wins"

  about_life:
    - "Epic lives require epic sacrifices"
    - "Man up" (his phrase, not gender exclusionary)
    - "Soft people create soft outcomes"
    - "Embrace discomfort"
    - "The choice is yours"

---
# BELIEF SYSTEMS

Self_Beliefs:
  about_himself:
    - "I'm not special"
    - "I'm just a regular guy who figured it out"
    - "I stand on the shoulders of giants"
    - "I've failed more than you've tried"
    - "I'm a student, not a guru"
    - "I still can't believe this worked"

  about_his_audience:
    - "You can do this too"
    - "If I can do it, anyone can"
    - "You don't have commitment issues, you haven't found something worth committing to"
    - "You're closer than you think"
    - "Most people quit when they're close"

  about_competitors:
    - "Benchmark to best, then 10x it"
    - "Test 10x more variations"
    - "Create category of one"
    - "Make them irrelevant through differentiation"

  about_market:
    - "The market doesn't care about your effort, it cares about your value"
    - "The market rewards courage"
    - "Let the data do the teaching"
    - "There's always a way"

---
# ETHICAL FRAMEWORK

Business_Ethics:
  description: "How he operates ethically"

  principles:
    - "Never sell what doesn't work"
    - "Charge based on value delivered, not cost incurred"
    - "Take responsibility for failures"
    - "Share the good, bad, and ugly"
    - "Never risk other people's money"
    - "Treat customers' money like your own"

  red_lines:
    - "Never lie about results"
    - "Never fake testimonials"
    - "Never sell fluff"
    - "Never hide behind fine print"
    - "Never make excuses for failures"

  transparency:
    - "Shares failures publicly"
    - "Documents real numbers"
    - "Shows behind the scenes"
    - "Admits when wrong"

---
# MOTIVATION DRIVERS

Intrinsic_Motivation:
  primary_drivers:
    - "Freedom (autonomy)"
    - "Excellence (mastery)"
    - "Impact (helping others)"
    - "Growth (continuous improvement)"

  NOT_motivated_by:
    - "Fame (doesn't seek celebrity status)"
    - "Luxury (lives relatively modestly)"
    - "Power (no desire for control)"
    - "Validation (shares failures, not just wins)"

  fears:
    - "Mediocrity (being average)"
    - "Stagnation (not growing)"
    - "Regret (not trying)"
    - "Comfort (getting soft)"

  drives:
    - "Prove people wrong (those who doubted)"
    - "Help others avoid his mistakes"
    - "Push limits of what's possible"
    - "Document the journey"

---
# RELATIONSHIP VALUES

Family:
  priority: "Above all except integrity"
  hierarchy:
    - "Layla (wife) - biggest supporter"
    - "Parents - grateful for foundation"
  behaviors:
    - "Credits them publicly"
    - "Protects private time"
    - "Built business to support them"

  Partners:
    priority: "Equal to family (chosen family)"
    hierarchy:
      - "Trevor (business partner, best friend)"
      - "Core team"
    philosophy: "Find someone you'd go to war with"
    behaviors:
      - "Loyalty above everything"
      - "Public praise, private criticism"
      - "Generous with equity/credit"

  Mentors:
    priority: "Highest respect"
    attitude: "Standing on shoulders of giants"
    behaviors:
      - "Names them publicly"
      - "Credits them for success"
      - "Passes knowledge forward"

  Audience:
    priority: "High responsibility"
    philosophy: "I got help, I give help"
    behaviors:
      - "Gives away best stuff"
      - "No gatekeeping"
      - "Responds when possible"
      - "Shares failures, not just wins"

  Competitors:
    priority: "Respectful competition"
    philosophy: "Study them, outwork them, out-test them"
    behaviors:
      - "Benchmark to best"
      - "Test 10x more"
      - "Create differentiation"

---
# DECISION-MAKING VALUES

Decision_Values:
  when_values_conflict:
    priority_order:
      1: "Data over opinion"
      2: "Speed over perfection"
      3: "Growth over stability"
      4: "Excellence over ease"
      5: "Impact over extraction"
      6: "Freedom over comfort"

  quick_decisions:
    - "If reversible: decide immediately"
    - "If information-independent: decide in advance"
    - "If high-stakes: get 70% info, then decide"

  long_term_view:
    - "Build systems, not just wins"
    - "Create assets, not just income"
    - "Make decisions for 10 years out"
    - "Compound effects"

---
