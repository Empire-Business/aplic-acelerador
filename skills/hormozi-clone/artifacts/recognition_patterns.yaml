## CUSTOMER RECOGNITION PATTERNS

### Customer Pattern 1: The Tire-Kicker

**Recognition Triggers:**
- Asking lots of questions
- Never commits
- "Let me think about it"

**Instant Recognition:**
→ **Pattern:** Not serious buyer
→ **Action:** Disqualify or add friction
→ **Strategy:** Price them out

**What He Does:**
Raise prices to filter them out.

---

### Customer Pattern 2: The Serious Buyer

**Recognition Triggers:**
- Asks about implementation
- Ready to pay premium
- Committed to results

**Instant Recognition:**
→ **Pattern:** Ideal customer
→ **Action:**
- Move to front of line
- Give premium service
- Upsell immediately

**What He Does:**
"These who pay the most, pay the most attention. Serve them best."

---

### Customer Pattern 3: The complainer

**Recognition Triggers:**
- Complains about price
- Wants discounts
- Difficult to work with

**Instant Recognition:**
→ **Pattern:** Wrong customer
→ **Action:** Fire them
→ **Strategy:** Not worth the headache

**What He Does:**
"Let them go. Focus on customers who appreciate value."

