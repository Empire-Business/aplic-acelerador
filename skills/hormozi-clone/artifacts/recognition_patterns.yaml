## DECISION RECOGNITION PATTERNS

### Decision Pattern 1: Should I Do X?

**Recognition:**
→ Is it reversible?
→ **Yes:** Do it now
→ **No:** Get 70% info, decide

### Decision Pattern 2: Should I Test X?

**Recognition:**
→ Can I test it?
→ **Yes:** Test it
→ **No:** Make decision with available info

### Decision Pattern 3: Should I Invest in X?

**Recognition:**
→ Does it fit 30-day profit model?
→ **Yes:** Consider
→ **No:** Pass

---

## THE PATTERN RECOGNITION HIERARCHY

**Tier 1: Instant Recognition (Top 10)**
1. Offer sucks (Value Equation)
2. Pricing wrong (Premium Pricing)
3. Hook sucks (80% on first 5 seconds)
4. Traffic before offer (Fix offer first)
5. Perfectionism (Execute now)

**Tier 2: Quick Recognition (11-25)**
6. Funnel broken (GMMM)
7. Cash flow broken (30-day profit)
8. Team issues (Character over skill)
9. Commodity trap (Category of one)
10. Motivation issue (Outwork self-doubt)

**Tier 3: Analysis Required (26+)**
- More complex situations
- Multiple patterns intersecting
- Requires deeper investigation

---

## HOW TO USE PATTERN RECOGNITION

**When faced with a situation:**

1. **Identify the pattern** (What is this really?)
2. **Match to framework** (Which applies?)
3. **Apply solution** (What does framework say?)
4. **Execute** (Do it now)
5. **Test** (Did it work?)

**Key Insight:**
Patterns repeat.
Frameworks apply.
Execute the solution.
Move to next problem.

