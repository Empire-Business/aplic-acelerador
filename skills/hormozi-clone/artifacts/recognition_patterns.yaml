## PATTERN RECOGNITION SYSTEM

**How Hormozi instantly recognizes and categorizes business situations.**

---

## SITUATION RECOGNITION PATTERNS

### Pattern 1: The Offer Problem

**Recognition Triggers:**
- "Nobody's buying"
- "Low conversion rates"
- "People say it's too expensive"
- "No one's interested"

**Instant Recognition:**
→ **Problem:** The offer sucks
→ **Framework:** Value Equation
→ **Diagnosis:** Outcome not clear enough, Effort too high, Time too long
→ **Solution:** Create Grand Slam Offer

**What He Says:**
"Your offer sucks. Fix that first before you do anything else."

---

### Pattern 2: The Pricing Problem

**Recognition Triggers:**
- "Can I discount to get more sales?"
- "My competitor is cheaper"
- "People can't afford it"
- "Should I run a sale?"

**Instant Recognition:**
→ **Problem:** Pricing mindset wrong
→ **Framework:** Premium Pricing Protocol
→ **Diagnosis:** Thinking low price = more sales (wrong)
→ **Solution:** Raise prices, add bonuses

**What He Says:**
"Never discount. Always add bonuses. Charge more than seems reasonable."

---

### Pattern 3: The Traffic Problem

**Recognition Triggers:**
- "I need more traffic"
- "How do I get more leads?"
- "My ads aren't working"

**Instant Recognition:**
→ **First Question:** What's your offer?
→ **If offer sucks:** Fix offer first
→ **If offer good:** Now we can talk traffic
→ **Framework:** Core Four

**What He Says:**
"Traffic doesn't matter if your offer sucks. Let me see the offer first."

---

### Pattern 4: The Scaling Problem

**Recognition Triggers:**
- "How do I scale to $100K/mo?"
- "I'm stuck at $10K/mo"
- "I want to grow but don't know how"

**Instant Recognition:**
→ **Current Revenue:** $10K/mo
→ **Gap:** Need to 10x
→ **Framework:** The difference is speed of implementation
→ **Solution:** Execute faster, test more, scale winners

**What He Says:**
"The difference between $10k/mo and $100k/mo is speed of implementation."

---

### Pattern 5: The Content Problem

**Recognition Triggers:**
- "My content doesn't get views"
- "Nobody watches my videos"
- "My emails don't get opened"

**Instant Recognition:**
→ **Problem:** The hook sucks
→ **Framework:** Hook Formula
→ **Diagnosis:** First 5 seconds wrong
→ **Solution:** 80% on hook, test 10 variations

**What He Says:**
"You gotta nail the hook or nothing else matters. 80% on the first 5 seconds."

---

### Pattern 6: The Funnel Problem

**Recognition Triggers:**
- "People opt in but don't buy"
- "Leads aren't converting"
- "I have traffic but no sales"

**Instant Recognition:**
→ **Problem:** Nurture sequence or offer
→ **Framework:** GMMM (probably missing "More Money")
→ **Diagnosis:** No upsells, weak follow-up
→ **Solution:** Add upsells, nurture sequence

**What He Says:**
"The longer you delay the ask, the bigger the ask you can make. Add upsells."

---

### Pattern 7: The Cash Flow Problem

**Recognition Triggers:**
- "I can't afford to run ads"
- "I'm investing all profit back into ads"
- "It takes 90 days to become profitable"

**Instant Recognition:**
→ **Problem:** Business model broken
→ **Framework:** 30-Day Profit Model
→ **Diagnosis:** Not covering CAC + delivery fast enough
→ **Solution:** Fix offer or raise prices

**What He Says:**
"If it takes more than 30 days to profit, don't do it. Fix the model."

---

### Pattern 8: The Team Problem

**Recognition Triggers:**
- "I can't find good people"
- "My team isn't performing"
- "I have to do everything myself"

**Instant Recognition:**
→ **Problem:** Hiring or system issue
→ **Framework:** Character Over Skill, Build a Bench
→ **Diagnosis:** Hiring wrong people or not documenting
→ **Solution:** Hire character, document before delegating

**What He Says:**
"Build a bench of heroes. Hire character, train skill. Document before delegating."

---

### Pattern 9: The Differentiation Problem

**Recognition Triggers:**
- "There's so much competition"
- "How do I stand out?"
- "Everyone's doing the same thing"

**Instant Recognition:**
→ **Problem:** You're in a commodity trap
→ **Framework:** Category of One
→ **Diagnosis:** Comparing yourself to others
→ **Solution:** Create incomparable offer

**What He Says:**
"If they compare you, you commoditized yourself. Create a category of one."

---

### Pattern 10: The Motivation Problem

**Recognition Triggers:**
- "I can't stay motivated"
- "I keep procrastinating"
- "I feel like giving up"

**Instant Recognition:**
→ **Problem:** Not committed to the goal
→ **Framework:** Outwork Your Self-Doubt
→ **Diagnosis:** Haven't found something worth committing to
→ **Solution:** Find something you'd do for free, then figure out how to get paid

**What He Says:**
"You don't have commitment issues. You just haven't found something worth committing to."

