## OBSTACLE RECOGNITION PATTERNS

### Obstacle Pattern 1: Perfectionism

**Recognition Triggers:**
- "I want to get it right before launching"
- "It's not ready yet"
- "Just a few more tweaks"

**Instant Recognition:**
→ **Pattern:** Perfectionism paralysis
→ **Diagnosis:** Fear of failure disguised as quality
→ **Solution:** Execute imperfectly over plan perfectly

**What He Says:**
"80% now beats 100% never. Execute today, optimize tomorrow."

---

### Obstacle Pattern 2: Analysis Paralysis

**Recognition Triggers:**
- "I'm still researching"
- "I need more information"
- "I'm not sure yet"

**Instant Recognition:**
→ **Pattern:** Over-thinking, under-doing
→ **Diagnosis:** Fear disguised as prudence
→ **Solution:** Make decisions with incomplete information

**What He Says:**
"Get 70% of the information, then decide. You'll never have 100%."

---

### Obstacle Pattern 3: Excuse-Making

**Recognition Triggers:**
- "I don't have time"
- "I don't have money"
- "I don't have experience"
- [Any excuse]

**Instant Recognition:**
→ **Pattern:** Externalizing blame
→ **Diagnosis:** Fear disguised as circumstance
→ **Solution:** Call it out directly

**What He Says:**
"That's an excuse. If you're committed, you'll find a way. If not, you'll find an excuse."

---

### Obstacle Pattern 4: Shiny Object Syndrome

**Recognition Triggers:**
- "I'm trying this new thing"
- "There's a new opportunity"
- "I'm pivoting again"

**Instant Recognition:**
→ **Pattern:** Lack of commitment
→ **Diagnosis:** Fear of sticking with one thing
→ **Solution:** Remove quitting as an option

**What He Says:**
"When you remove quitting as an option, success happens by default."

---

## OPPORTUNITY RECOGNITION PATTERNS

### Opportunity Pattern 1: Winner Identification

**Recognition Triggers:**
- Something is working unusually well
- High ROI on small test
- Unexpected success

**Instant Recognition:**
→ **Pattern:** Found a winner
→ **Action:** Scale ruthlessly
→ **Framework:** 70% of effort to this

**What He Does:**
Document it, create variations, scale to limit, then find next winner.

---

### Opportunity Pattern 2: Gap Identification

**Recognition Triggers:**
- People complaining about problem X
- Competitor ignoring problem Y
- Market inefficiency

**Instant Recognition:**
→ **Pattern:** Opportunity gap
→ **Action:** Create offer to fill gap
→ **Framework:** Grand Slam Offer

**What He Does:**
"Make people an offer so good they'd feel stupid saying no."

---

### Opportunity Pattern 3: Arbitrage Situations

**Recognition Triggers:**
- Same strategy works in different niche
- Different platform has less competition
- Price difference between markets

**Instant Recognition:**
→ **Pattern:** Arbitrage opportunity
→ **Action:** Adapt and execute
→ **Framework:** Winner Adjacent (20%)

**What He Does:**
"Take what works here and adapt it there."

