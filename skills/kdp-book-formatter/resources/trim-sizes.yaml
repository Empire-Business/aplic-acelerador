# Trim Sizes Oficiais Amazon KDP
# Kindle Direct Publishing - Paperback Trim Sizes

trim_sizes:
  "5x8":
    width: 5
    height: 8
    name: "5\" x 8\""
    description: "Romances compactos, memórias"
    category: "fiction"
    words_per_page: 255  # ajustado para área menor

  "5.25x8":
    width: 5.25
    height: 8
    name: "5.25\" x 8\""
    description: "Romances padrão"
    category: "fiction"
    words_per_page: 265

  "5.5x8.5":
    width: 5.5
    height: 8.5
    name: "5.5\" x 8.5\""
    description: "Ficção geral"
    category: "fiction"
    words_per_page: 280

  "6x9":
    width: 6
    height: 9
    name: "6\" x 9\""
    description: "Não-ficção (mais comum)"
    category: "non-fiction"
    words_per_page: 300  # baseline

  "7x10":
    width: 7
    height: 10
    name: "7\" x 10\""
    description: "Livros técnicos, textbooks"
    category: "technical"
    words_per_page: 360

  "8x10":
    width: 8
    height: 10
    name: "8\" x 10\""
    description: "Livros infantis, livros de arte"
    category: "special"
    words_per_page: 420

# Gutter (margem interna) por page count
gutter_margins:
  - max_pages: 150
    gutter: 0.5      # 1/2"
    fraction: "1/2"
  - max_pages: 400
    gutter: 0.5625   # 9/16"
    fraction: "9/16"
  - max_pages: 500
    gutter: 0.625    # 5/8"
    fraction: "5/8"
  - max_pages: 600
    gutter: 0.6875   # 11/16"
    fraction: "11/16"
  - max_pages: 700
    gutter: 0.75     # 3/4"
    fraction: "3/4"
  - max_pages: 800
    gutter: 0.8125   # 13/16"
    fraction: "13/16"
  - max_pages: 999999
    gutter: 0.875    # 7/8"
    fraction: "7/8"

# Margens mínimas KDP
minimum_margins:
  without_bleed:
    top: 0.25
    bottom: 0.25
    outside: 0.25
  with_bleed:
    top: 0.375
    bottom: 0.375
    outside: 0.375

# Font sizes recomendados
font_sizes:
  body:
    minimum: 10
    recommended: 11
    maximum: 12
  heading1:
    minimum: 16
    recommended: 18
    maximum: 24
  heading2:
    minimum: 14
    recommended: 16
    maximum: 18
  heading3:
    minimum: 12
    recommended: 14
    maximum: 16
  copyright:
    recommended: 9
  footer:
    recommended: 10

# Page count limits
page_limits:
  minimum: 24
  recommended_max: 828
  absolute_max: 999

# Line heights recomendados
line_heights:
  tight: 1.3
  normal: 1.5
  loose: 1.8
