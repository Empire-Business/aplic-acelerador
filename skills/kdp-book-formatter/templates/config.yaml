# Configuração de Livro KDP
# Use este arquivo como modelo para seus livros

# ========================================
# METADADOS DO LIVRO
# ========================================
title: "Título do Seu Livro"
subtitle: "Subtítulo Opcional"
author: "Nome do Autor"
publisher: "Nome da Editora (opcional)"
isbn: "978-65-00000-00-0"  # Opcional - deixe vazio se não tiver
publication_year: 2025

# ========================================
# DIMENSÕES E LAYOUT
# ========================================
# Trim size: 5x8, 5.25x8, 5.5x8.5, 6x9, 7x10
trim_size: "6x9"

font_size: 11      # Tamanho da fonte do corpo (recomendado: 11)
line_height: 1.5   # Espaçamento entre linhas (1.3 a 1.8)
has_bleed: false   # Se o livro tem elementos que vão até a borda

# ========================================
# ARQUIVOS DE ENTRADA
# ========================================
input:
  # Glob pattern para os capítulos
  chapters: "capitulos/*.md"

  # Arquivos opcionais de front matter
  front_matter:
    - "front-matter/dedicatória.md"
    - "front-matter/prefacio.md"

  # Arquivos opcionais de back matter
  back_matter:
    - "back-matter/sobre-autor.md"
    - "back-matter/agradecimentos.md"

# ========================================
# ARQUIVO DE SAÍDA
# ========================================
output:
  path: "./output/livro.pdf"

# ========================================
# ESTRUTURA DO LIVRO
# ========================================
structure:
  include_toc: true              # Incluir índice
  include_page_numbers: true     # Incluir numeração de páginas
  chapter_start: "right"         # "right" = página ímpar, "any" = qualquer página

# ========================================
# OPÇÕES AVANÇADAS
# ========================================
# Opções de estilo (opcional)
styles:
  pull_quotes: false       # Citações destacadas
  chapter_drop_cap: false  # Letra capitular no início dos capítulos
  text_alignment: "left"   # "left", "justify", ou "right"

# Opções de cabeçalho/rodapé (opcional)
headers_footers:
  show_header: false
  header_content: "{{title}} - {{author}}"
  page_number_position: "bottom-center"  # "bottom-center", "bottom-outside", etc
