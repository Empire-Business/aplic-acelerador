      1. "Coleta dados massivos"
      2. "Identifica padrões"
      3. "Confia intuição treinada"
      4. "Testa rapidamente"
      5. "Escala o que funciona"

  risk_tolerance: "calculated_risk_taker"
  - "Gosta de apostas quando há upside massivo"
  - "Testa pequeno antes de escalar"
  - "Não teme falhar publicamente"

